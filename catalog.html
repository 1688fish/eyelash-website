<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百货报价目录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#222}
.topbar{background:linear-gradient(135deg,#0d1b3e 0%,#1a3a6b 60%,#1e4d8c 100%);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.topbar-title{color:#fff;font-size:1.35rem;font-weight:700;letter-spacing:.04em;white-space:nowrap;margin-right:auto}
.topbar input[type=text]{padding:8px 14px;border-radius:22px;border:none;outline:none;font-size:.95rem;width:200px;background:rgba(255,255,255,.15);color:#fff;transition:.2s}
.topbar input[type=text]::placeholder{color:rgba(255,255,255,.6)}
.topbar input[type=text]:focus{background:rgba(255,255,255,.25);width:240px}
.btn{padding:8px 18px;border-radius:22px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:.18s}
.btn-add{background:#f0a500;color:#fff}
.btn-add:hover{background:#d4920a}
.btn-sample{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35)}
.btn-sample:hover{background:rgba(255,255,255,.28)}
.btn-lang{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);font-size:.82rem;padding:6px 13px}
.btn-lang:hover{background:rgba(255,255,255,.22)}
.chips-bar{padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #e0e4ea}
.chip{padding:5px 16px;border-radius:20px;border:1.5px solid #c8cfe0;background:#f7f9fc;color:#445;font-size:.88rem;cursor:pointer;transition:.15s;font-weight:500}
.chip.active,.chip:hover{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.stats-bar{background:#fff;border-top:1px solid #e0e4ea;padding:10px 24px;display:flex;gap:24px;font-size:.88rem;color:#667}
.stats-bar span b{color:#1a3a6b;font-size:1rem}
.grid-wrap{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;display:flex;flex-direction:column;transition:.18s}
.card:hover{box-shadow:0 6px 18px rgba(0,0,0,.13);transform:translateY(-2px)}
.card-img{width:100%;height:150px;background:#eef1f7;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.card-img img{width:100%;height:150px;object-fit:cover}
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:700;margin-bottom:2px}
.badge-lash{background:#fde8f0;color:#c0306a}
.badge-skin{background:#e3f5e8;color:#217a3c}
.badge-makeup{background:#fef3e2;color:#b86e00}
.badge-tool{background:#e5eeff;color:#1a3a8f}
.badge-pack{background:#f0eafb;color:#6b2fad}
.badge-other{background:#f0f2f5;color:#556}
.card-name{font-size:1rem;font-weight:700;color:#1a1a2e;line-height:1.3}
.card-spec{font-size:.8rem;color:#778;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sku{font-size:.76rem;color:#aab}
.card-price{font-size:1.18rem;font-weight:800;color:#c0306a;margin-top:4px}
.card-moq{font-size:.78rem;color:#889}
.card-actions{display:flex;gap:8px;padding:8px 14px 12px}
.btn-edit{flex:1;background:#e5eeff;color:#1a3a8f;border:none;border-radius:8px;padding:6px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.btn-edit:hover{background:#1a3a8f;color:#fff}
.btn-del{flex:1;background:#fdeaea;color:#c0305a;border:none;border-radius:8px;padding:6px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.btn-del:hover{background:#c0305a;color:#fff}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#aab}
.empty-icon{font-size:3.5rem;margin-bottom:12px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:92%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:1.08rem;color:#1a1a2e}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;line-height:1}
.modal-body{padding:18px 22px 10px}
.img-upload-area{border:2px dashed #c8d0e0;border-radius:10px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s;margin-bottom:14px;position:relative;overflow:hidden;background:#f7f9fc}
.img-upload-area.drag-over{border-color:#1a3a6b;background:#e8eef8}
.img-upload-area img{width:100%;max-height:160px;object-fit:cover;border-radius:8px}
.img-upload-hint{color:#99a;font-size:.85rem;text-align:center;padding:10px}
.img-upload-hint span{font-size:2rem;display:block;margin-bottom:4px}
#imgUpload{display:none}
.img-remove{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.85rem;display:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.82rem;color:#556;font-weight:600}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1.5px solid #d0d6e0;border-radius:8px;font-size:.9rem;outline:none;transition:.15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1a3a6b}
.form-group textarea{resize:vertical;min-height:56px}
.modal-foot{padding:12px 22px 18px;display:flex;gap:10px;justify-content:flex-end}
.btn-save{background:#1a3a6b;color:#fff;padding:9px 26px;border-radius:10px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-save:hover{background:#0d2550}
.btn-cancel{background:#f0f2f5;color:#445;padding:9px 20px;border-radius:10px;border:none;font-size:.95rem;cursor:pointer}
@media(max-width:600px){.topbar{gap:8px}.topbar-title{font-size:1.1rem}.grid-wrap{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));padding:12px}.form-row{grid-template-columns:1fr}.topbar input[type=text]{width:140px}.topbar input[type=text]:focus{width:160px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title" data-i18n="title">百货报价目录</div>
  <input type="text" id="searchBox" placeholder="搜索商品..." oninput="renderGrid()">
  <button class="btn btn-add" onclick="openModal()" data-i18n="addProduct">＋ 添加商品</button>
  <button class="btn btn-sample" onclick="loadSample()" data-i18n="loadSample">导入示例</button>
  <button class="btn btn-lang" onclick="toggleLang()" id="langBtn">EN</button>
</div>
<div class="chips-bar" id="chipsBar"></div>
<div class="grid-wrap" id="productGrid"></div>
<div class="stats-bar">
  <span data-i18n="totalProducts">商品总数</span>:&nbsp;<b id="statTotal">0</b>
  &nbsp;&nbsp;
  <span data-i18n="totalCategories">分类数</span>:&nbsp;<b id="statCats">0</b>
</div>
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="modalTitle">添加商品</h2>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="img-upload-area" id="imgDropArea"
        onclick="document.getElementById('imgUpload').click()"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropImg(event)">
        <div class="img-upload-hint" id="imgHint"><span>&#128247;</span><span data-i18n="imgHint">点击或拖拽上传图片<br>JPG/PNG/WEBP，最大2MB</span></div>
        <img id="imgPreview" style="display:none">
        <button class="img-remove" id="imgRemove" onclick="removeImg(event)">&#x2715;</button>
      </div>
      <input type="file" id="imgUpload" accept="image/jpeg,image/png,image/webp" onchange="fileSelected(event)">
      <div class="form-row">
        <div class="form-group"><label data-i18n="fieldName">商品名称 *</label><input type="text" id="fName" placeholder="例：经典款仿貂毛睫毛"></div>
        <div class="form-group"><label data-i18n="fieldCategory">分类 *</label>
          <select id="fCategory">
            <option value="睫毛">睫毛</option>
            <option value="护肤">护肤</option>
            <option value="彩妆">彩妆</option>
            <option value="工具">工具</option>
            <option value="包装">包装</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label data-i18n="fieldPrice">单价 (¥) *</label><input type="number" id="fPrice" min="0" step="0.01" placeholder="0.00"></div>
        <div class="form-group"><label data-i18n="fieldUnit">单位</label><input type="text" id="fUnit" placeholder="盒/个/pcs"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label data-i18n="fieldMOQ">MOQ</label><input type="number" id="fMOQ" min="1" placeholder="100"></div>
        <div class="form-group"><label data-i18n="fieldSKU">SKU 编码</label><input type="text" id="fSKU" placeholder="EL-001"></div>
      </div>
      <div class="form-row full"><div class="form-group"><label data-i18n="fieldSpec">规格 / 描述</label><textarea id="fSpec" placeholder="颜色、尺寸、材质等"></textarea></div></div>
      <div class="form-row full"><div class="form-group"><label data-i18n="fieldNote">备注</label><textarea id="fNote" placeholder="其他说明"></textarea></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()" data-i18n="cancel">取消</button>
      <button class="btn-save" onclick="saveProduct()" data-i18n="save">保存</button>
    </div>
  </div>
</div>
<script>
const LANGS={
  zh:{
    title:'百货报价目录',searchPlaceholder:'搜索商品...',addProduct:'＋ 添加商品',
    loadSample:'导入示例',allCats:'全部',totalProducts:'商品总数',totalCategories:'分类数',
    imgHint:'点击或拖拽上传图片<br>JPG/PNG/WEBP，最大2MB',
    fieldName:'商品名称 *',fieldCategory:'分类 *',fieldPrice:'单价 (¥) *',
    fieldUnit:'单位',fieldMOQ:'MOQ',fieldSKU:'SKU 编码',fieldSpec:'规格 / 描述',
    fieldNote:'备注',cancel:'取消',save:'保存',
    addProductTitle:'添加商品',editProductTitle:'编辑商品',
    moqLabel:'MOQ',emptyHint:'暂无商品，点击「添加商品」或「导入示例」开始',
    edit:'编辑',del:'删除',confirmDel:'确认删除该商品？',
    imgSizeErr:'图片不能超过 2MB',imgTypeErr:'仅支持 JPG/PNG/WEBP 格式',
    sampleLoaded:'示例数据已导入'
  },
  en:{
    title:'Product Catalog',searchPlaceholder:'Search products...',addProduct:'＋ Add Product',
    loadSample:'Load Sample',allCats:'All',totalProducts:'Total Products',totalCategories:'Categories',
    imgHint:'Click or drag & drop image<br>JPG/PNG/WEBP, max 2MB',
    fieldName:'Product Name *',fieldCategory:'Category *',fieldPrice:'Unit Price (¥) *',
    fieldUnit:'Unit',fieldMOQ:'MOQ',fieldSKU:'SKU Code',fieldSpec:'Spec / Description',
    fieldNote:'Note',cancel:'Cancel',save:'Save',
    addProductTitle:'Add Product',editProductTitle:'Edit Product',
    moqLabel:'MOQ',emptyHint:'No products yet. Click "Add Product" or "Load Sample" to begin.',
    edit:'Edit',del:'Delete',confirmDel:'Delete this product?',
    imgSizeErr:'Image must be under 2MB',imgTypeErr:'Only JPG/PNG/WEBP allowed',
    sampleLoaded:'Sample data loaded'
  }
};
let lang='zh';
const t=k=>LANGS[lang][k]||k;
const CATS=['睫毛','护肤','彩妆','工具','包装','其他'];
const CATS_EN=['Lashes','Skincare','Makeup','Tools','Packaging','Other'];
const BADGE_CLASS={睫毛:'lash',护肤:'skin',彩妆:'makeup',工具:'tool',包装:'pack',其他:'other'};
const STORE_KEY='catalog_products';
let products=[];
let currentCat='all';
let editingId=null;
let pendingImg=null;
function loadData(){try{products=JSON.parse(localStorage.getItem(STORE_KEY))||[];}catch(e){products=[];}}
function saveData(){localStorage.setItem(STORE_KEY,JSON.stringify(products));}
function genId(){return 'p'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
function applyLang(){
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  document.title=t('title');
  document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(LANGS[lang][k]!==undefined)el.innerHTML=LANGS[lang][k];
  });
  const sb=document.getElementById('searchBox');
  if(sb)sb.placeholder=t('searchPlaceholder');
  const sel=document.getElementById('fCategory');
  if(sel)CATS.forEach((c,i)=>{sel.options[i].text=lang==='zh'?c:CATS_EN[i];});
  renderChips();
  renderGrid();
}
function toggleLang(){lang=lang==='zh'?'en':'zh';applyLang();}
function renderChips(){
  const bar=document.getElementById('chipsBar');
  const used=new Set(products.map(p=>p.category));
  let html=`<div class="chip${currentCat==='all'?' active':''}" onclick="setCat('all')">${t('allCats')}</div>`;
  CATS.forEach((c,i)=>{
    if(used.has(c)){
      const label=lang==='zh'?c:CATS_EN[i];
      html+=`<div class="chip${currentCat===c?' active':''}" onclick="setCat('${c}')">${label}</div>`;
    }
  });
  bar.innerHTML=html;
}
function setCat(c){currentCat=c;renderChips();renderGrid();}
function renderGrid(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const list=products.filter(p=>{
    const matchCat=currentCat==='all'||p.category===currentCat;
    const matchQ=!q||p.name.toLowerCase().includes(q)||(p.spec||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  const grid=document.getElementById('productGrid');
  if(!list.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">&#128230;</div><div>${t('emptyHint')}</div></div>`;
  } else {
    grid.innerHTML=list.map(p=>cardHTML(p)).join('');
  }
  document.getElementById('statTotal').textContent=products.length;
  document.getElementById('statCats').textContent=new Set(products.map(p=>p.category)).size;
}
function catLabel(c){
  const i=CATS.indexOf(c);
  return lang==='zh'?c:(i>=0?CATS_EN[i]:c);
}
function cardHTML(p){
  const bc=BADGE_CLASS[p.category]||'other';
  const imgPart=p.image
    ?`<div class="card-img"><img src="${p.image}" alt=""></div>`
    :`<div class="card-img">&#128230;</div>`;
  return `<div class="card">${imgPart}
    <div class="card-body">
      <span class="card-badge badge-${bc}">${catLabel(p.category)}</span>
      <div class="card-name">${esc(p.name)}</div>
      ${p.spec?`<div class="card-spec">${esc(p.spec)}</div>`:''}
      ${p.sku?`<div class="card-sku">SKU: ${esc(p.sku)}</div>`:''}
      <div class="card-price">¥${parseFloat(p.price||0).toFixed(2)} <small style="font-size:.7rem;font-weight:400;color:#888">${esc(p.unit||'')}</small></div>
      ${p.moq?`<div class="card-moq">${t('moqLabel')}: ${p.moq}</div>`:''}
    </div>
    <div class="card-actions">
      <button class="btn-edit" onclick="editProduct('${p.id}')">${t('edit')}</button>
      <button class="btn-del" onclick="deleteProduct('${p.id}')">${t('del')}</button>
    </div></div>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openModal(id){
  editingId=id||null;
  pendingImg=null;
  const p=id?products.find(x=>x.id===id):null;
  document.getElementById('modalTitle').textContent=id?t('editProductTitle'):t('addProductTitle');
  document.getElementById('fName').value=p?p.name:'';
  document.getElementById('fCategory').value=p?p.category:'睫毛';
  document.getElementById('fPrice').value=p?p.price:'';
  document.getElementById('fUnit').value=p?p.unit:'';
  document.getElementById('fMOQ').value=p?p.moq:'';
  document.getElementById('fSKU').value=p?p.sku:'';
  document.getElementById('fSpec').value=p?p.spec:'';
  document.getElementById('fNote').value=p?p.note:'';
  if(p&&p.image){showImgPreview(p.image);pendingImg=p.image;}else{clearImgPreview();}
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert(lang==='zh'?'请填写商品名称':'Please enter product name');return;}
  const price=parseFloat(document.getElementById('fPrice').value);
  if(isNaN(price)||price<0){alert(lang==='zh'?'请填写有效价格':'Please enter a valid price');return;}
  const obj={
    id:editingId||genId(),
    name,
    category:document.getElementById('fCategory').value,
    price:price.toFixed(2),
    unit:document.getElementById('fUnit').value.trim(),
    moq:document.getElementById('fMOQ').value.trim(),
    sku:document.getElementById('fSKU').value.trim(),
    spec:document.getElementById('fSpec').value.trim(),
    note:document.getElementById('fNote').value.trim(),
    image:pendingImg||null
  };
  if(editingId){const i=products.findIndex(x=>x.id===editingId);if(i>=0)products[i]=obj;}
  else{products.unshift(obj);}
  saveData();
  closeModal();
  renderChips();
  renderGrid();
}
function editProduct(id){openModal(id);}
function deleteProduct(id){
  if(!confirm(t('confirmDel')))return;
  products=products.filter(p=>p.id!==id);
  saveData();
  renderChips();
  renderGrid();
}
function showImgPreview(src){
  const preview=document.getElementById('imgPreview');
  const hint=document.getElementById('imgHint');
  const remove=document.getElementById('imgRemove');
  preview.src=src;
  preview.style.display='block';
  hint.style.display='none';
  remove.style.display='block';
}
function clearImgPreview(){
  const preview=document.getElementById('imgPreview');
  const hint=document.getElementById('imgHint');
  const remove=document.getElementById('imgRemove');
  preview.src='';
  preview.style.display='none';
  hint.style.display='flex';
  remove.style.display='none';
  document.getElementById('imgUpload').value='';
}
function removeImg(e){
  e.stopPropagation();
  pendingImg=null;
  clearImgPreview();
}
function processImageFile(file){
  if(!file)return;
  if(!['image/jpeg','image/png','image/webp'].includes(file.type)){alert(t('imgTypeErr'));return;}
  if(file.size>2*1024*1024){alert(t('imgSizeErr'));return;}
  const reader=new FileReader();
  reader.onload=e=>{pendingImg=e.target.result;showImgPreview(e.target.result);};
  reader.readAsDataURL(file);
}
function fileSelected(e){processImageFile(e.target.files[0]);}
function dragOver(e){e.preventDefault();document.getElementById('imgDropArea').classList.add('drag-over');}
function dragLeave(e){document.getElementById('imgDropArea').classList.remove('drag-over');}
function dropImg(e){
  e.preventDefault();
  document.getElementById('imgDropArea').classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  processImageFile(file);
}
function loadSample(){
  if(products.length>0&&!confirm(lang==='zh'?'导入示例将追加到现有数据，确认？':'Append sample data to existing products?'))return;
  const samples=[
    {id:genId(),name:'经典款仿貂毛假睫毛',category:'睫毛',price:'18.00',unit:'盒',moq:'100',sku:'EL-001',spec:'0.15mm C弯，长度10-14mm，韩国PBT纤维',note:'',image:null},
    {id:genId(),name:'磁吸假睫毛套装',category:'睫毛',price:'35.00',unit:'套',moq:'50',sku:'EL-002',spec:'含4条磁吸睫毛+磁吸眼线液，可重复使用',note:'',image:null},
    {id:genId(),name:'自然裸妆半段睫毛',category:'睫毛',price:'22.00',unit:'盒',moq:'200',sku:'EL-003',spec:'0.07mm D弯，长度8-10mm，轻薄透气',note:'',image:null},
    {id:genId(),name:'烫睫夹（加热款）',category:'工具',price:'12.00',unit:'个',moq:'100',sku:'TL-001',spec:'USB充电，38°C恒温，适合亚洲人眼型',note:'',image:null},
    {id:genId(),name:'睫毛胶水（黑色）',category:'工具',price:'8.00',unit:'支',moq:'200',sku:'TL-002',spec:'5ml，速干配方，持久24小时，无刺激',note:'',image:null},
    {id:genId(),name:'睫毛梳镊子套装',category:'工具',price:'9.50',unit:'套',moq:'150',sku:'TL-003',spec:'不锈钢材质，含梳子+镊子，携带方便',note:'',image:null},
    {id:genId(),name:'磨砂纸质睫毛包装盒',category:'包装',price:'2.50',unit:'个',moq:'500',sku:'PK-001',spec:'9cm×5cm×2cm，可定制印刷Logo',note:'',image:null},
